<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Screen Clock</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            color: black;
            transition: background-color 0.3s, color 0.3s;
        }

        #time {
            font-size: 20vw;
            font-weight: bold;
        }

        #invert-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: transparent;
            border: 2px solid currentColor;
            border-radius: 5px;
            color: currentColor; /* Use currentColor for text color */
            transition: background-color 0.3s, color 0.3s;
        }

        /* Inverted color styles */
        .inverted {
            background-color: black;
            color: white;
        }

        .inverted #invert-btn {
            border-color: white;
            color: white; /* Ensure button text color is white in inverted mode */
        }
    </style>
</head>
<body>
    <div id="time">00:00:00</div>
    <button id="invert-btn">Invert Colors</button>

    <script>
        function updateTime() {
            const timeElement = document.getElementById('time');
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            timeElement.textContent = `${hours}:${minutes}:${seconds}`;
        }

        function toggleInvertColors() {
            document.body.classList.toggle('inverted');
        }

        document.getElementById('invert-btn').addEventListener('click', toggleInvertColors);

        setInterval(updateTime, 1000);
        updateTime(); // Initial call to set the time immediately
    </script>
</body>
</html>
