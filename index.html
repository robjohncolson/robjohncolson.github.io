<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass Management App</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database.js"></script>
</head>
<body>
    <h1>Classroom Pass Management</h1>

    <div id="login-form">
        <label for="name">Enter Your Name:</label>
        <input type="text" id="name" required>
        <button id="login-button">Login</button>
    </div>

    <div id="pass-form" style="display: none;">
        <label for="pass-type">Select Pass Type:</label>
        <select id="pass-type" required>
            <option value="Bathroom">Bathroom</option>
            <option value="Water Fountain">Water Fountain</option>
            <option value="Guidance">Guidance</option>
            <option value="Library">Library</option>
            <option value="Main Office">Main Office</option>
            <option value="Teen Health">Teen Health</option>
            <option value="Other">Other</option>
        </select>

        <div id="other-pass" style="display: none;">
            <label for="other-reason">Please specify:</label>
            <input type="text" id="other-reason">
        </div>

        <button id="request-pass">Request Pass</button>

        <h2>Your Requests</h2>
        <ul id="student-pass-list"></ul>
        <button id="logout-button">Logout</button>
    </div>

    <div id="teacher-view" style="display: none;">
        <h2>Pending Requests</h2>
        <ul id="pass-list"></ul>
        <button id="logout-button-teacher">Logout</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
