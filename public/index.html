<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Pass Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Classroom Pass Management System</h1>
<a href="https://be7d-73-16-30-214.ngrok-free.app/">link to server</a>"
    <div id="student-section">
        <h2>Student View</h2>
        <label for="student-name">Your Name:</label>
        <input type="text" id="student-name" placeholder="Enter your name">
        <label for="pass-type">Pass Type:</label>
        <select id="pass-type">
            <option value="Bathroom">Bathroom</option>
            <option value="Water Fountain">Water Fountain</option>
            <option value="Library">Library</option>
            <option value="Guidance">Guidance</option>
            <option value="Other">Other</option>
        </select>
        <button id="submit-pass">Submit Pass Request</button>

        <h3>Your Pass Requests</h3>
        <ul id="student-pass-list"></ul>
    </div>

    <hr>

    <div id="teacher-section">
        <h2>Teacher View</h2>
        <h3>Pending Pass Requests</h3>
        <ul id="teacher-pass-list"></ul>
    </div>

    <script src="student.js"></script>
    <script src="teacher.js"></script>
</body>
</html>
